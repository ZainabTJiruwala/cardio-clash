# ECG Analyzer Application Configuration

# Application Settings
app.name=ECG Anomaly Analyzer
app.version=1.0.0

# Detection Thresholds (BPM)
detection.tachycardia.threshold=100
detection.bradycardia.threshold=60
detection.severe.tachycardia.threshold=150
detection.severe.bradycardia.threshold=40

# Signal Processing
signal.default.sampling.rate=360
signal.filter.enabled=true
signal.filter.lowpass=40
signal.filter.highpass=0.5

# ML Model Paths (future use)
ml.model.mi.path=models/mi_detector.zip
ml.model.murmur.path=models/murmur_detector.zip

# UI Settings
ui.chart.max.points=2000
ui.default.window.width=1400
ui.default.window.height=900
